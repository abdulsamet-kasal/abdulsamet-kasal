name: Generate Snake Animation

on:
  # Her 12 saatte bir otomatik çalıştırır
  schedule:
    - cron: "0 */12 * * *"
  
  # İstediğin zaman manuel olarak tetiklemene olanak tanır
  workflow_dispatch:
  
  # Ana dala her push yapıldığında çalışır
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          # Commit grafiğinin çekileceği kullanıcı adı
          github_user_name: abdulsamet-kasal
          
          # Çıktı olarak oluşturulacak dosyalar ve temalar (Hem aydınlık hem karanlık mod)
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          # Dosyaların yükleneceği branch (README'deki link buraya bakıyor)
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
